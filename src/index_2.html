<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Code:Enigma — Video Modülü</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;font-family:'IBM Plex Mono',monospace;background:#F8F9FB;color:#111827;overflow:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#f1f5f9}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}

  .pulse-dot{animation:pulse-dot 2s ease-in-out infinite}
  .fadein{animation:fadein 0.3s ease both}
  .logo-hex{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
  .ch-card{transition:box-shadow 0.2s,transform 0.2s}
  .ch-card:hover{box-shadow:0 4px 16px rgba(37,99,235,0.10);transform:translateY(-1px)}

  /* Panel slide transition */
  .panel-enter{animation:slideIn 0.32s cubic-bezier(0.4,0,0.2,1) both}
  .panel-exit{animation:slideOut 0.28s cubic-bezier(0.4,0,0.2,1) both}

  input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid #2563EB;box-shadow:0 1px 4px rgba(0,0,0,.2)}

  /* MCQ option states */
  .opt-base{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:7px;border:1px solid #e2e8f0;cursor:pointer;transition:border-color 0.15s,background 0.15s;font-size:11px;font-family:'IBM Plex Mono';line-height:1.55;text-align:left;width:100%;background:#fff}
  .opt-base:hover:not(:disabled){border-color:#93c5fd;background:#EFF6FF}
  .opt-correct{border-color:#059669!important;background:#ECFDF5!important;color:#065f46}
  .opt-wrong{border-color:#DC2626!important;background:#FEF2F2!important;color:#991b1b}
  .opt-disabled{cursor:not-allowed;opacity:0.6}

  .solution-box{animation:fadein 0.3s ease both;margin-top:10px;padding:14px;background:#FFFBEB;border:1px solid #D97706;border-left:3px solid #D97706;border-radius:8px;font-size:11px;line-height:1.75;color:#374151}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ═══════════ DATA ═══════════ */
const CHAPTERS = [
  {
    id:1, title:"Giriş", start:0, end:35, phase:"Bölüm 01",
    accent:"#2563EB", accentBg:"#EFF6FF",
    summary:"Bu bölümde güvenirlik katsayısının ne olduğuna ve neden önemli olduğuna genel bir bakış yapılmaktadır. Psikolojik testlerin tutarlılığını değerlendirmek için kullanılan temel kavramlar tanıtılmaktadır.",
    questions:[
      {
        q:"Güvenirlik katsayısı hangi aralıkta değer alır?",
        opts:["A) 0 ile 100 arasında","B) −1 ile +1 arasında","C) 0 ile 1 arasında","D) 1 ile 10 arasında","E) Sınırsız değer alır"],

        solution:"Güvenirlik katsayısı (rₓ) 0 ile 1 arasında değer alır. 0 tam güvensizliği, 1 ise mükemmel güvenirliği ifade eder. Negatif değer almaz çünkü varyans oranı olarak tanımlanır."

      {
        q:"Bir ölçme aracının güvenirliği ne anlama gelir?",
        opts:["A) Ölçtüğü şeyi doğru ölçmesi","B) Farklı koşullarda tutarlı sonuç vermesi","C) Kısa sürede uygulanabilmesi","D) Geniş kapsama sahip olması","E) Puanlamanın kolay yapılabilmesi"],

    accent:"#7C3AED", accentBg:"#F5F3FF",
    summary:"ÖSH = S · √(1 − rₓ) formülü ile Ölçmenin Standart Hatası hesaplanır. Güvenirlik katsayısı 1'e yaklaştıkça kök içindeki ifade küçülür ve ÖSH değeri düşer.",
    questions:[
      {
        q:"ÖSH formülünde 'S' neyi temsil eder?",
        opts:["A) Standart hatayı","B) Testin standart sapmasını","C) Örneklem büyüklüğünü","D) Güvenirlik katsayısını","E) Ortalama puanı"],

        opts:["A) Maksimum olurdu","B) S değerine eşit olurdu","C) Sıfır olurdu","D) Tanımsız olurdu","E) Değişmezdi"],

    ],
    flashcards:[
      {front:"ÖSH",back:"Ölçmenin Standart Hatası = S · √(1 − rₓ)"},

      {front:"S",back:"Testin standart sapması."},
    ]
  },
  {
    id:3, title:"Güvenirlik Örnekleri", start:106, end:150, phase:"Bölüm 03",
    accent:"#059669", accentBg:"#ECFDF5",
    summary:"Yüksek güvenirlik (rₓ=0.96) durumunda ÖSH=5 gibi düşük bir değer elde edilirken, düşük güvenirlik (rₓ=0.51) durumunda ÖSH=7 gibi daha yüksek bir hata ortaya çıkar.",
    questions:[
      {
        q:"rₓ = 0.96, S = 25 iken ÖSH yaklaşık kaçtır?",
        opts:["A) 25","B) 5","C) 12","D) 0.96","E) 1"],
        correct:1,
        solution:"ÖSH = 25 · √(1 − 0.96) = 25 · √0.04 = 25 · 0.2 = 5. Yüksek güvenirlik (0.96) çok küçük bir hata (5 puan) üretir."

        q:"Hangi durum daha yüksek ölçüm hatasına yol açar?",
        opts:["A) rₓ = 0.95 ve S = 10","B) rₓ = 0.51 ve S = 10","C) rₓ = 0.90 ve S = 15","D) rₓ = 0.80 ve S = 8","E) rₓ = 0.70 ve S = 6"],
        correct:1,
        solution:"rₓ=0.51, S=10 → ÖSH=10·√0.49≈7.0. Diğerleri: A→2.24, C→4.74, D→3.58, E→4.24. Düşük güvenirlik ve yüksek standart sapma birlikte en büyük hatayı üretir."
      },
    ],
    flashcards:[
      {front:"Yüksek Güvenirlik",back:"rₓ ≥ 0.80 → ÖSH düşük → hassas ölçüm."},

    ]
  },
  {
    id:4, title:"Güvenirlik Katsayısı", start:150, end:210, phase:"Bölüm 04",
    accent:"#D97706", accentBg:"#FFFBEB",
    summary:"Güvenirlik katsayısı hesaplama yöntemleri karşılaştırılır: test-tekrar test, iç tutarlılık ve paralel form. Her yöntemin avantajları ele alınır.",
    questions:[
      {
        q:"Cronbach alfa katsayısı hangi güvenirlik türünü ölçer?",
        opts:["A) Test-tekrar test güvenirliği","B) Paralel form güvenirliği","C) İç tutarlılık güvenirliği","D) Gözlemciler arası güvenirlik","E) Kapsam geçerliği"],
        correct:2,
        solution:"Cronbach alfa (α), bir testin maddelerinin birbiriyle ne kadar tutarlı olduğunu gösteren iç tutarlılık katsayısıdır. α ≥ 0.70 genellikle kabul edilebilir sınır olarak kullanılır."
      },
      {
        q:"Test-tekrar test yönteminin temel sınırlılığı nedir?",
        opts:["A) Hesaplaması çok zordur","B) Sadece çoktan seçmeli testlere uygulanır","C) Öğrenme ve hatırlama etkilerinden etkilenir","D) Paralel form gerektirmesi","E) Madde sayısına bağlı olması"],
        correct:2,
        solution:"Test-tekrar test yönteminde aynı test iki kez uygulanır. Bu nedenle birinci uygulamada öğrenilen bilgiler veya hatırlama etkileri ikinci uygulamayı olumlu yönde etkiler; bu da güvenirliği olduğundan yüksek gösterebilir."

      {front:"Test-Tekrar Test",back:"Aynı testin farklı zamanlarda uygulanmasıyla hesaplanan güvenirlik."},

  },
  {
    id:5, title:"Test Eşik Değeri", start:210, end:265, phase:"Bölüm 05",
    accent:"#DC2626", accentBg:"#FEF2F2",
    summary:"Güvenirlik eşiği bağlama göre değişir: klinik kararlar için rₓ ≥ 0.90, araştırma ortamları için rₓ ≥ 0.70 yeterli kabul edilebilir.",
    questions:[
      {
        q:"Bireysel klinik karar almada önerilen minimum güvenirlik eşiği nedir?",
        opts:["A) 0.50","B) 0.60","C) 0.70","D) 0.80","E) 0.90"],
        correct:4,
        solution:"Yüksek riskli bireysel kararlar (klinik tanı, yetenek seçimi) için rₓ ≥ 0.90 önerilir. Bunun altındaki değerler bireysel hataları kabul edilemez ölçüde yükseltir."
      },
      {
        q:"Araştırma amaçlı testlerde genellikle hangi güvenirlik eşiği yeterli kabul edilir?",
        opts:["A) 0.90 ve üzeri","B) 0.80 ve üzeri","C) 0.70 ve üzeri","D) 0.60 ve üzeri","E) 0.50 ve üzeri"],
        correct:2,
        solution:"Grup düzeyinde araştırmalarda bireysel hata oranları daha az kritik olduğundan rₓ ≥ 0.70 yeterli kabul edilir. Grup ortalamaları, bireysel hatalar ortalamasıyla dengelenir."
      },
    ],
    flashcards:[
      {front:"Klinik Eşik",back:"rₓ ≥ 0.90 — yüksek riskli bireysel kararlar."},
      {front:"Araştırma Eşiği",back:"rₓ ≥ 0.70 — grup düzeyinde araştırmalar."},
    ]
  },
];

const TOTAL = 265;
const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
const getCh = t => CHAPTERS.find(c => t >= c.start && t < c.end) || CHAPTERS[CHAPTERS.length-1];
const OPTS_LABELS = ["A","B","C","D","E"];

/* ═══════════ ChapterTimeline ═══════════ */
function ChapterTimeline({ currentTime, duration, onSeek }) {
  const ref = useRef(null);
  const [hover, setHover] = useState(null);
  const [dragging, setDragging] = useState(false);

  const getRatio = useCallback(e => {
    const r = ref.current.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  }, []);

  useEffect(() => {
    const up = () => setDragging(false);
    window.addEventListener("mouseup", up);
    return () => window.removeEventListener("mouseup", up);
  }, []);

  return (
    <div style={{ position:"relative", padding:"4px 0 0" }}>
      {hover && (
        <div style={{ position:"absolute", bottom:"calc(100%+8px)",
          left: Math.max(36, Math.min(hover.px, (ref.current?.offsetWidth||300)-80)),
          transform:"translateX(-40%)",
          background:"#111827", color:"#fff", fontSize:9, fontWeight:700,
          padding:"4px 10px", borderRadius:3, pointerEvents:"none", zIndex:20,
          whiteSpace:"nowrap", boxShadow:"0 4px 12px rgba(0,0,0,.2)" }}>
          {hover.ch.title} · {fmt(hover.ratio * duration)}
        </div>
      )}
      <div ref={ref}
        style={{ display:"flex", gap:3, cursor:"pointer", userSelect:"none" }}
        onMouseMove={e => {
          const r = ref.current.getBoundingClientRect();
          const px = e.clientX - r.left;
          const ratio = Math.max(0, Math.min(1, px / r.width));
          setHover({ ratio, px, ch: getCh(ratio * duration) });
          if (dragging) onSeek(ratio * duration);
        }}
        onMouseLeave={() => setHover(null)}
        onMouseDown={e => { setDragging(true); onSeek(getRatio(e) * duration); }}>
        {CHAPTERS.map(ch => {
          const w = ((ch.end - ch.start) / duration) * 100;
          const pct = currentTime <= ch.start ? 0
            : currentTime >= ch.end ? 100
            : ((currentTime - ch.start) / (ch.end - ch.start)) * 100;
          const isActive = currentTime >= ch.start && currentTime < ch.end;
          return (
            <div key={ch.id} style={{ flex:`0 0 calc(${w}% - 2px)`, height:isActive?7:4, marginTop:isActive?0:1.5, borderRadius:2, background:"rgba(255,255,255,0.12)", overflow:"hidden", transition:"height .15s,margin-top .15s" }}>
              <div style={{ height:"100%", width:`${pct}%`, background:ch.accent, transition:dragging?"none":"width .1s linear" }}/>
            </div>
          );
        })}
      </div>
      <div style={{ display:"flex", gap:3, marginTop:5 }}>
        {CHAPTERS.map(ch => {
          const w = ((ch.end - ch.start) / duration) * 100;
          const isActive = currentTime >= ch.start && currentTime < ch.end;
          return (
            <div key={ch.id} onClick={() => onSeek(ch.start)}
              style={{ flex:`0 0 calc(${w}% - 2px)`, overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis", fontSize:9, fontWeight:isActive?700:500, color:isActive?ch.accent:"rgba(255,255,255,.3)", letterSpacing:"0.04em", cursor:"pointer", transition:"color .2s" }}>
              {ch.title}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════ Controls ═══════════ */
function Controls({ playing, currentTime, duration, volume, muted, onPlay, onSeek, onVolume, onMute, onFullscreen }) {
  const ch = getCh(currentTime);
  return (
    <div style={{ background:"linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 100%)", padding:"32px 18px 14px" }}>
      <ChapterTimeline currentTime={currentTime} duration={duration} onSeek={onSeek}/>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:10 }}>
        <button onClick={onPlay} style={{ background:"none", border:"none", color:"#fff", cursor:"pointer", display:"flex", padding:3 }}>
          {playing
            ? <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            : <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>}
        </button>
        <button onClick={onMute} style={{ background:"none", border:"none", color:"rgba(255,255,255,.6)", cursor:"pointer", display:"flex", padding:3 }}>
          {muted||volume===0
            ? <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" strokeWidth="2.5"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" strokeWidth="2.5"/></svg>
            : <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" strokeWidth="2" fill="none"/></svg>}
        </button>
        <input type="range" min="0" max="1" step="0.05" value={muted?0:volume}
          onChange={e => onVolume(parseFloat(e.target.value))}
          style={{ width:52, background:`linear-gradient(to right,${ch.accent} ${(muted?0:volume)*100}%,rgba(255,255,255,.2) 0%)` }}/>
        <span style={{ fontSize:11, color:"rgba(255,255,255,.5)", fontFamily:"'IBM Plex Mono'" }}>
          <span style={{ color:"#fff" }}>{fmt(currentTime)}</span> / {fmt(duration)}
        </span>
        <div style={{ flex:1 }}/>
        <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.5px", textTransform:"uppercase", color:ch.accent, background:`${ch.accent}22`, border:`1px solid ${ch.accent}44`, padding:"3px 9px", borderRadius:3 }}>
          {ch.phase}
        </div>
        <button onClick={onFullscreen} style={{ background:"none", border:"none", color:"rgba(255,255,255,.5)", cursor:"pointer", display:"flex", padding:3 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
        </button>
      </div>
    </div>
  );
}

/* ═══════════ Chapter Sidebar ═══════════ */
function ChapterSidebar({ currentTime, onSeek }) {
  return (
    <div style={{ width:152, minWidth:152, background:"#fff", borderRight:"1px solid #e2e8f0", overflowY:"auto", padding:"10px 7px", display:"flex", flexDirection:"column", gap:4 }}>
      <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.8px", textTransform:"uppercase", color:"#94a3b8", padding:"4px 6px 8px" }}>İçindekiler</div>
      {CHAPTERS.map(ch => {
        const isActive = currentTime >= ch.start && currentTime < ch.end;
        const isDone = currentTime >= ch.end;
        return (
          <div key={ch.id} onClick={() => onSeek(ch.start)} className="ch-card"
            style={{ borderRadius:8, overflow:"hidden", cursor:"pointer", border:`1px solid ${isActive?ch.accent+"55":"#e2e8f0"}`, background:isActive?ch.accentBg:"#fff", transition:"all .2s" }}>
            <div style={{ height:3, background:isDone||isActive?ch.accent:"#e2e8f0", transition:"background .3s" }}/>
            <div style={{ padding:"8px 10px 10px" }}>
              <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.5px", textTransform:"uppercase", color:isActive?ch.accent:"#cbd5e1", marginBottom:3 }}>{ch.phase}</div>
              <div style={{ fontSize:11, fontWeight:isActive?600:400, color:isActive?"#111827":"#64748b", lineHeight:1.4 }}>{ch.title}</div>
              <div style={{ fontSize:9, color:"#94a3b8", marginTop:3 }}>{fmt(ch.start)}–{fmt(ch.end)}</div>
              {isDone && <div style={{ fontSize:9, color:ch.accent, marginTop:4, fontWeight:600 }}>✓ Tamamlandı</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════ Tab: Özet ═══════════ */
function TabSummary({ chapter }) {
  return (
    <div style={{ padding:"16px 0" }} className="fadein">
      <p style={{ fontSize:12, lineHeight:1.85, color:"#475569", fontWeight:300 }}>{chapter.summary}</p>
    </div>
  );
}

/* ═══════════ Tab: Soru (5 şıklı MCQ) ═══════════ */
function TabQuestion({ chapter }) {
  const [qi, setQi] = useState(0);
  const [selected, setSelected] = useState(null); // index seçilen şık
  const [showSolution, setShowSolution] = useState(false);

  const resetQ = (newIdx) => { setQi(newIdx); setSelected(null); setShowSolution(false); };

  useEffect(() => { resetQ(0); }, [chapter.id]);

  const questions = chapter.questions;
  const q = questions[qi];
  const answered = selected !== null;
  const isCorrect = selected === q.correct;

  return (
    <div style={{ padding:"16px 0", display:"flex", flexDirection:"column", gap:10 }} className="fadein">

      {/* Soru nav */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:2 }}>
        <span style={{ fontSize:9, fontWeight:700, letterSpacing:"1.8px", textTransform:"uppercase", color:"#94a3b8" }}>
          Soru {qi+1} / {questions.length}
        </span>
        <div style={{ display:"flex", gap:5 }}>
          {questions.map((_,i) => (
            <button key={i} onClick={() => resetQ(i)}
              style={{ width:22, height:22, borderRadius:4, border:`1px solid ${i===qi?chapter.accent:"#e2e8f0"}`, background:i===qi?chapter.accentBg:"#fff", color:i===qi?chapter.accent:"#94a3b8", fontSize:9, fontWeight:700, cursor:"pointer", fontFamily:"'IBM Plex Mono'" }}>
              {i+1}
            </button>
          ))}
        </div>
      </div>

      {/* Soru metni */}
      <div style={{ background:"#F8F9FB", border:`1px solid #e2e8f0`, borderLeft:`3px solid ${chapter.accent}`, borderRadius:8, padding:"12px 14px" }}>
        <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.8px", textTransform:"uppercase", color:"#94a3b8", marginBottom:8 }}>Soru</div>
        <p style={{ fontSize:12, color:"#111827", lineHeight:1.7, fontWeight:500 }}>{q.q}</p>
      </div>

      {/* Şıklar */}
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {q.opts.map((opt, i) => {
          let cls = "opt-base";
          let extraStyle = {};
          if (answered) {
            if (i === q.correct) { cls += " opt-correct"; }
            else if (i === selected && !isCorrect) { cls += " opt-wrong"; }
            else { cls += " opt-disabled"; }
          }
          return (
            <button key={i}
              className={cls}
              disabled={answered}
              onClick={() => setSelected(i)}
              style={extraStyle}>
              <div style={{
                minWidth:22, height:22, borderRadius:5,
                border:`1.5px solid ${answered && i===q.correct ? "#059669" : answered && i===selected && !isCorrect ? "#DC2626" : "#e2e8f0"}`,
                background: answered && i===q.correct ? "#059669" : answered && i===selected && !isCorrect ? "#DC2626" : "#fff",
                color: answered && (i===q.correct || (i===selected&&!isCorrect)) ? "#fff" : "#94a3b8",
                fontSize:9, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center",
                transition:"all .15s", flexShrink:0,
              }}>
                {OPTS_LABELS[i]}
              </div>
              <span style={{ fontSize:11, lineHeight:1.55 }}>{opt.slice(3)}</span>
              {answered && i===q.correct && (
                <svg style={{marginLeft:"auto",flexShrink:0}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              )}
              {answered && i===selected && !isCorrect && i!==q.correct && (
                <svg style={{marginLeft:"auto",flexShrink:0}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#DC2626" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              )}
            </button>
          );
        })}
      </div>

      {/* Sonuç + Çözümü Gör */}
      {answered && (
        <div className="fadein" style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {/* Sonuç banner */}
          <div style={{
            padding:"10px 14px", borderRadius:7,
            background: isCorrect ? "#ECFDF5" : "#FEF2F2",
            border: `1px solid ${isCorrect?"#059669":"#DC2626"}`,
            display:"flex", alignItems:"center", gap:8,
          }}>
            {isCorrect
              ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#DC2626" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>}
            <span style={{ fontSize:11, fontWeight:700, color: isCorrect?"#065f46":"#991b1b" }}>
              {isCorrect ? "Doğru cevap!" : `Yanlış. Doğru cevap: ${OPTS_LABELS[q.correct]}`}
            </span>
          </div>

          {/* Çözümü Gör butonu */}
          {!showSolution ? (
            <button onClick={() => setShowSolution(true)}
              style={{ background:"#FFFBEB", border:"1px solid #D97706", color:"#92400e", padding:"9px 12px", borderRadius:6, cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono'", display:"flex", alignItems:"center", gap:7, justifyContent:"center", transition:"background .15s" }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              Çözümü Gör
            </button>
          ) : (
            <div className="solution-box">
              <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.8px", textTransform:"uppercase", color:"#D97706", marginBottom:8 }}>Çözüm</div>
              {q.solution}
            </div>
          )}
        </div>
      )}

      {/* Sonraki soru */}
      {answered && qi < questions.length - 1 && (
        <button onClick={() => resetQ(qi+1)}
          style={{ background:chapter.accentBg, border:`1px solid ${chapter.accent}44`, color:chapter.accent, padding:"9px", borderRadius:6, cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono'", marginTop:2 }}>
          Sonraki Soru →
        </button>
      )}
      {answered && qi === questions.length - 1 && (
        <button onClick={() => resetQ(0)}
          style={{ background:"#F8F9FB", border:"1px solid #e2e8f0", color:"#64748b", padding:"9px", borderRadius:6, cursor:"pointer", fontSize:11, fontFamily:"'IBM Plex Mono'", marginTop:2 }}>
          Baştan Başla
        </button>
      )}
    </div>
  );
}

/* ═══════════ Tab: Flashcards ═══════════ */
function TabFlashcards({ chapter }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  useEffect(() => { setIdx(0); setFlipped(false); }, [chapter.id]);
  const cards = chapter.flashcards;
  const card = cards[idx];
  return (
    <div style={{ padding:"16px 0", display:"flex", flexDirection:"column", gap:10 }} className="fadein">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:9, fontWeight:700, letterSpacing:"1.5px", textTransform:"uppercase", color:"#94a3b8" }}>{idx+1} / {cards.length}</span>
        <div style={{ display:"flex", gap:4 }}>
          {cards.map((_,i) => (
            <div key={i} onClick={() => { setIdx(i); setFlipped(false); }}
              style={{ width:6, height:6, borderRadius:"50%", background:i===idx?chapter.accent:"#e2e8f0", cursor:"pointer", transition:"background .2s" }}/>
          ))}
        </div>
      </div>
      <div onClick={() => setFlipped(!flipped)} style={{ perspective:600, cursor:"pointer" }}>
        <div style={{ position:"relative", height:114, transformStyle:"preserve-3d", transition:"transform .5s cubic-bezier(0.4,0,0.2,1)", transform:flipped?"rotateY(180deg)":"rotateY(0deg)" }}>
          <div style={{ position:"absolute", inset:0, backfaceVisibility:"hidden", WebkitBackfaceVisibility:"hidden", background:"#F8F9FB", border:"1px solid #e2e8f0", borderTop:`3px solid ${chapter.accent}`, borderRadius:8, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:16, textAlign:"center" }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.8px", textTransform:"uppercase", color:"#94a3b8", marginBottom:8 }}>Kavram</div>
            <div style={{ fontSize:14, fontWeight:700, color:"#111827" }}>{card.front}</div>
            <div style={{ fontSize:9, color:"#cbd5e1", marginTop:10 }}>Çevirmek için tıkla →</div>
          </div>
          <div style={{ position:"absolute", inset:0, backfaceVisibility:"hidden", WebkitBackfaceVisibility:"hidden", transform:"rotateY(180deg)", background:chapter.accentBg, border:`1px solid ${chapter.accent}44`, borderTop:`3px solid ${chapter.accent}`, borderRadius:8, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:16, textAlign:"center" }}>
            <div style={{ fontSize:9, fontWeight:700, letterSpacing:"1.8px", textTransform:"uppercase", color:chapter.accent, marginBottom:8 }}>Tanım</div>
            <div style={{ fontSize:12, color:"#374151", lineHeight:1.65, fontWeight:400 }}>{card.back}</div>
          </div>
        </div>
      </div>
      <div style={{ display:"flex", gap:6 }}>
        {[["← Önceki", Math.max(0,idx-1), idx===0], ["Sonraki →", Math.min(cards.length-1,idx+1), idx===cards.length-1]].map(([label,next,dis]) => (
          <button key={label} onClick={() => { setIdx(next); setFlipped(false); }} disabled={dis}
            style={{ flex:1, background:"none", border:"1px solid #e2e8f0", color:dis?"#cbd5e1":"#374151", borderRadius:6, padding:"7px", cursor:dis?"not-allowed":"pointer", fontSize:11, fontFamily:"'IBM Plex Mono'" }}>
            {label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════ Content Panel ═══════════ */
const PANEL_WIDTH = 310;

function ContentPanel({ chapter, visible, onClose }) {
  const [tab, setTab] = useState("summary");
  const [animClass, setAnimClass] = useState("panel-enter");
  const [rendered, setRendered] = useState(false);

  // Track previous visible to handle enter/exit animation
  const prevVisible = useRef(false);

  useEffect(() => {
    if (visible && !prevVisible.current) {
      setRendered(true);
      setAnimClass("panel-enter");
    } else if (!visible && prevVisible.current) {
      setAnimClass("panel-exit");
      const t = setTimeout(() => setRendered(false), 290);
      return () => clearTimeout(t);
    }
    prevVisible.current = visible;
  }, [visible]);

  useEffect(() => setTab("summary"), [chapter?.id]);

  if (!rendered) return null;

  const tabs = [
    { id:"summary",    label:"Özet",   icon:"◈" },
    { id:"question",   label:"Soru",   icon:"⌖" },
    { id:"flashcards", label:"Kartlar",icon:"◎" },
  ];

  return (
    <div className={animClass}
      style={{ width:PANEL_WIDTH, minWidth:PANEL_WIDTH, background:"#fff", borderLeft:"1px solid #e2e8f0", display:"flex", flexDirection:"column", overflow:"hidden", flexShrink:0 }}>

      {/* Header */}
      <div style={{ padding:"16px 18px 12px", borderBottom:"1px solid #e2e8f0", background:chapter.accentBg, display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:5 }}>
            <div style={{ width:14, height:2, background:chapter.accent, borderRadius:1 }}/>
            <span style={{ fontSize:9, fontWeight:700, letterSpacing:"2px", textTransform:"uppercase", color:chapter.accent }}>{chapter.phase}</span>
          </div>
          <h2 style={{ fontWeight:700, fontSize:14, color:"#111827", letterSpacing:"-0.3px", lineHeight:1.3 }}>{chapter.title}</h2>
          <div style={{ fontSize:10, color:"#94a3b8", marginTop:3 }}>{fmt(chapter.start)} – {fmt(chapter.end)}</div>
        </div>
        {/* Kapat butonu */}
        <button onClick={onClose}
          title="Paneli Kapat"
          style={{ background:"none", border:"1px solid #e2e8f0", borderRadius:6, width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:"#94a3b8", flexShrink:0, marginTop:2, transition:"background .15s, color .15s" }}
          onMouseEnter={e=>{e.currentTarget.style.background="#FEF2F2";e.currentTarget.style.color="#DC2626";}}
          onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="#94a3b8";}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", borderBottom:"1px solid #e2e8f0" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ flex:1, padding:"9px 4px", background:"none", border:"none", borderBottom:tab===t.id?`2px solid ${chapter.accent}`:"2px solid transparent", color:tab===t.id?chapter.accent:"#94a3b8", fontFamily:"'IBM Plex Mono'", fontWeight:700, fontSize:9, letterSpacing:"0.06em", textTransform:"uppercase", cursor:"pointer", transition:"color .15s,border-color .15s" }}>
            <div style={{ fontSize:13, marginBottom:2 }}>{t.icon}</div>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{ flex:1, overflowY:"auto", padding:"0 18px" }}>
        {tab==="summary"    && <TabSummary    chapter={chapter} key={chapter.id}/>}
        {tab==="question"   && <TabQuestion   chapter={chapter} key={chapter.id}/>}
        {tab==="flashcards" && <TabFlashcards chapter={chapter} key={chapter.id}/>}
      </div>

      {/* Stats footer */}
      <div style={{ padding:"10px 18px", borderTop:"1px solid #e2e8f0", display:"flex", gap:8 }}>
        {[
          { val:chapter.questions.length,  label:"Soru"  },
          { val:chapter.flashcards.length, label:"Kart"  },
          { val:fmt(chapter.end-chapter.start), label:"Süre" },
        ].map(s => (
          <div key={s.label} style={{ flex:1, background:"#F8F9FB", border:"1px solid #e2e8f0", borderRadius:6, padding:"8px", textAlign:"center" }}>
            <div style={{ fontWeight:700, fontSize:13, color:"#111827" }}>{s.val}</div>
            <div style={{ fontSize:9, color:"#94a3b8", marginTop:1 }}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════ Panel Toggle Button ═══════════ */
function PanelToggleBtn({ panelOpen, onClick, accent }) {
  return (
    <button
      onClick={onClick}
      title={panelOpen ? "Paneli Gizle" : "Paneli Aç"}
      style={{
        position:"absolute", top:14, right: panelOpen ? `${PANEL_WIDTH + 10}px` : "10px",
        zIndex:30, background:"#fff", border:"1px solid #e2e8f0",
        borderRadius:6, width:30, height:30,
        display:"flex", alignItems:"center", justifyContent:"center",
        cursor:"pointer", boxShadow:"0 2px 8px rgba(0,0,0,.1)",
        color:"#64748b", transition:"right 0.32s cubic-bezier(0.4,0,0.2,1), background .15s, color .15s",
      }}
      onMouseEnter={e=>{e.currentTarget.style.background=accent+"18";e.currentTarget.style.color=accent;}}
      onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.color="#64748b";}}>
      {panelOpen
        ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>}
    </button>
  );
}

/* ═══════════ Root App ═══════════ */
function App() {
  const containerRef = useRef(null);
  const tickRef = useRef(null);
  const hideTimer = useRef(null);
  const prevPlayingRef = useRef(false);
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCurrent] = useState(0);
  const [volume, setVolume] = useState(0.8);
  const [muted, setMuted] = useState(false);
  const [panelOpen, setPanelOpen] = useState(false);
  const [ctrlVisible, setCtrlVisible] = useState(true);

  useEffect(() => {
    if (playing) {
      tickRef.current = setInterval(() => setCurrent(t => {
        if (t >= TOTAL) { setPlaying(false); return TOTAL; }
        return t + 0.1;
      }), 100);
    } else {
      clearInterval(tickRef.current);
    }
    return () => clearInterval(tickRef.current);
  }, [playing]);

  const handlePlay = () => {
    setPlaying(prev => !prev);
  };

  // Kullanıcı paneli kapatmış olsa bile, video oynatma durumundan durmaya
  // geçtiğinde paneli tekrar otomatik aç.
  useEffect(() => {
    if (prevPlayingRef.current && !playing) {
      setPanelOpen(true);
    }
    prevPlayingRef.current = playing;
  }, [playing]);

  const showCtrl = () => {
    setCtrlVisible(true);
    clearTimeout(hideTimer.current);
    if (playing) hideTimer.current = setTimeout(() => setCtrlVisible(false), 2500);
  };

  const ch = getCh(currentTime);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#F8F9FB", overflow:"hidden" }}>

      {/* HEADER */}
      <header style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px", height:60, background:"#fff", borderBottom:"1px solid #e2e8f0", boxShadow:"0 1px 3px rgba(0,0,0,.04)", flexShrink:0, zIndex:50 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div className="logo-hex" style={{ width:34, height:34, display:"flex", alignItems:"center", justifyContent:"center", background:"#2563EB", color:"#fff", fontWeight:700, fontSize:10, letterSpacing:"-0.5px" }}>C:E</div>
          <div>
            <div style={{ fontWeight:700, fontSize:14, letterSpacing:"-0.3px", color:"#111827" }}>Code:Enigma</div>
            <div style={{ fontSize:9, fontWeight:500, letterSpacing:"1.8px", textTransform:"uppercase", color:"#94a3b8", marginTop:1 }}>Video Modülü</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#94a3b8" }}>
          <span style={{ color:"#64748b" }}>Güvenirlik Katsayısı</span>
          <span>›</span>
          <span style={{ color:ch.accent, fontWeight:600 }}>{ch.title}</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div className="pulse-dot" style={{ width:5, height:5, borderRadius:"50%", background:playing?"#059669":"#94a3b8" }}/>
          <span style={{ fontSize:10, fontWeight:600, letterSpacing:"1px", textTransform:"uppercase", color:playing?"#059669":"#94a3b8" }}>
            {playing ? "Oynatılıyor" : "Durduruldu"}
          </span>
        </div>
      </header>

      {/* MAIN */}
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Chapter sidebar */}
        <ChapterSidebar currentTime={currentTime} onSeek={t => setCurrent(t)}/>

        {/* Video area — flex:1, genişlik panele göre daralır/genişler */}
        <div ref={containerRef}
          style={{
            flex:1, display:"flex", flexDirection:"column",
            background:"#0f172a", position:"relative", minWidth:0,
            cursor:"pointer",
            transition:"flex .32s cubic-bezier(0.4,0,0.2,1)",
          }}
          onMouseMove={showCtrl}
          onClick={handlePlay}>

          {/* Video placeholder */}
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", background:`radial-gradient(ellipse at 30% 40%,${ch.accent}18 0%,#0f172a 65%)`, transition:"background .6s ease", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", inset:0, backgroundImage:"radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px)", backgroundSize:"28px 28px", pointerEvents:"none" }}/>
            <div style={{ position:"absolute", top:18, left:18, fontSize:9, fontWeight:700, letterSpacing:"2px", textTransform:"uppercase", color:ch.accent, background:`${ch.accent}22`, border:`1px solid ${ch.accent}44`, padding:"3px 10px", borderRadius:3 }}>
              {ch.phase}
            </div>

            {/* Slide card */}
            <div style={{ background:"rgba(255,255,255,.04)", backdropFilter:"blur(2px)", border:"1px solid rgba(255,255,255,.08)", borderLeft:`3px solid ${ch.accent}`, borderRadius:12, padding:"28px 36px", maxWidth:520, width:"78%", transition:"border-color .4s" }}>
              <div style={{ fontSize:9, fontWeight:700, letterSpacing:"2px", textTransform:"uppercase", color:ch.accent, marginBottom:12 }}>{ch.phase} — {ch.title}</div>
              <div style={{ fontWeight:700, fontSize:18, color:"#f1f5f9", marginBottom:14, letterSpacing:"-0.3px", lineHeight:1.3 }}>{ch.title}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,.45)", lineHeight:1.8, fontWeight:300 }}>{ch.summary.slice(0,140)}…</div>
            </div>

            {/* Big play overlay */}
            <div style={{ position:"absolute", width:62, height:62, borderRadius:"50%", background:"rgba(255,255,255,.08)", backdropFilter:"blur(8px)", border:"1px solid rgba(255,255,255,.15)", display:"flex", alignItems:"center", justifyContent:"center", opacity:playing?0:1, transition:"opacity .2s", pointerEvents:"none" }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
            </div>

            {/* Panel toggle button — video alanının sağ üstünde, panelin dışında */}
            <PanelToggleBtn panelOpen={panelOpen} onClick={e => { e.stopPropagation(); setPanelOpen(o => !o); }} accent={ch.accent}/>
          </div>

          {/* Controls */}
          <div style={{ position:"absolute", bottom:0, left:0, right:0, opacity:ctrlVisible||!playing?1:0, transition:"opacity .3s" }}
            onClick={e => e.stopPropagation()}>
            <Controls
              playing={playing} currentTime={currentTime} duration={TOTAL}
              volume={volume} muted={muted}
              onPlay={handlePlay}
              onSeek={t => setCurrent(Math.max(0, Math.min(TOTAL, t)))}
              onVolume={v => { setVolume(v); setMuted(v===0); }}
              onMute={() => setMuted(!muted)}
              onFullscreen={() => document.fullscreenElement ? document.exitFullscreen() : containerRef.current?.requestFullscreen()}/>
          </div>
        </div>

        {/* Sliding content panel */}
        <ContentPanel chapter={ch} visible={panelOpen} onClose={() => setPanelOpen(false)}/>
      </div>

      {/* FOOTER */}
      <footer style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px", height:46, background:"#fff", borderTop:"1px solid #e2e8f0", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div className="logo-hex" style={{ width:22, height:22, display:"flex", alignItems:"center", justifyContent:"center", background:"#2563EB", color:"#fff", fontWeight:700, fontSize:8 }}>C:E</div>
          <span style={{ fontWeight:600, fontSize:12, color:"#111827" }}>Code:Enigma</span>
        </div>
        <div style={{ display:"flex", gap:16, alignItems:"center" }}>
          {[{label:"Cebir",val:72,color:"#2563EB"},{label:"Geometri",val:48,color:"#7C3AED"},{label:"Sayı Teorisi",val:91,color:"#059669"}].map(p => (
            <div key={p.label} style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:36, height:3, background:"#e2e8f0", borderRadius:2, overflow:"hidden" }}>
                <div style={{ width:`${p.val}%`, height:"100%", background:p.color }}/>
              </div>
              <span style={{ fontSize:9, color:"#64748b" }}>{p.label} <span style={{ color:p.color, fontWeight:600 }}>{p.val}%</span></span>
            </div>
          ))}
        </div>
        <p style={{ fontSize:10, color:"#94a3b8" }}>© {new Date().getFullYear()} Açık ve Uzaktan Eğitim Projesi</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
